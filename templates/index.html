<!DOCTYPE html>
<html>

<head>

<title>Public Health AI Chatbot</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="chat-container">

<h2>Public Health AI Chatbot</h2>
<div class="categories">

<button onclick="selectCategory('disease')">Diseases</button>

<button onclick="selectCategory('emergency')">Emergency Numbers</button>

<button onclick="selectCategory('first aid')">First Aid</button>

<button onclick="selectCategory('nutrition')">Nutrition Tips</button>

</div>
<div id="chat-box"></div>

<div class="input-area">
<input id="message" placeholder="Ask about dengue, malaria, covid">
<button onclick="sendMessage()">Send</button>
</div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
